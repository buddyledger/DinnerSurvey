<style>
  :root {
    --bg: #1a1310;
    --bg-2: #241a15;
    --card: #2d201a;
    --card-2: #382820;
    --line: #4a3528;
    --amber: #e8a04a;
    --amber-bright: #f5b860;
    --cream: #f4e4cf;
    --rust: #c1542a;
    --muted: #a08a72;
    --text: #f0e2cc;
    --text-dim: #c9b89c;
    --shadow: 0 4px 20px rgba(0,0,0,.4);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background-image:
      radial-gradient(ellipse at top, rgba(232, 160, 74, .08), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(193, 84, 42, .06), transparent 50%);
    min-height: 100vh;
  }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* HEADER */
  header.hero {
    text-align: center;
    padding: 32px 12px 28px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 32px;
  }
  .kicker {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: .35em;
    color: var(--amber);
    font-size: 13px;
    margin-bottom: 10px;
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-weight: 400;
    font-style: italic;
    margin: 0 0 8px;
    font-size: clamp(34px, 7vw, 52px);
    line-height: 1;
    color: var(--cream);
  }
  .sub {
    color: var(--text-dim);
    font-size: 15px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* SUBMITTER BLOCK */
  .submitter-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }
  .submitter-card h2 {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: .15em;
    font-size: 18px;
    margin: 0 0 14px;
    color: var(--amber);
  }
  label.field {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  input[type="text"], input[type="email"], textarea, select {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 11px 12px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 15px;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--amber);
    box-shadow: 0 0 0 3px rgba(232, 160, 74, .15);
  }
  textarea { resize: vertical; min-height: 64px; }

  /* PERSON CARDS */
  .people-section h2.section-title {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: .2em;
    color: var(--amber);
    font-size: 16px;
    margin: 8px 0 16px;
  }
  .person-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 18px 8px;
    margin-bottom: 18px;
    box-shadow: var(--shadow);
    position: relative;
  }
  .person-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px dashed var(--line);
  }
  .person-num {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--cream);
  }
  .person-num span.idx {
    color: var(--amber);
    font-weight: 600;
  }
  .remove-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: .05em;
    text-transform: uppercase;
    transition: all .15s;
  }
  .remove-btn:hover { color: var(--rust); border-color: var(--rust); }

  .person-fields {
    display: grid;
    gap: 12px;
    margin-bottom: 14px;
  }
  @media (min-width: 540px) {
    .person-fields.two-col { grid-template-columns: 1fr 1fr; }
  }

  /* CATEGORIES (collapsible) */
  .categories { margin-top: 8px; }
  details.category {
    border-top: 1px solid var(--line);
    padding: 0;
  }
  details.category:last-child { border-bottom: 1px solid var(--line); }
  details.category > summary {
    list-style: none;
    cursor: pointer;
    padding: 14px 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
  }
  details.category > summary::-webkit-details-marker { display: none; }
  .cat-title {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: .18em;
    color: var(--cream);
    font-size: 15px;
  }
  .cat-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--muted);
  }
  .selected-pill {
    background: rgba(232, 160, 74, .15);
    color: var(--amber);
    padding: 3px 9px;
    border-radius: 100px;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: .04em;
    display: none;
  }
  .selected-pill.active { display: inline-block; }
  .chev {
    transition: transform .2s;
    color: var(--muted);
    font-size: 18px;
  }
  details.category[open] .chev { transform: rotate(90deg); color: var(--amber); }

  .items {
    padding: 4px 4px 16px;
    display: grid;
    gap: 6px;
  }
  .item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .12s;
    border: 1px solid transparent;
  }
  .item:hover { background: var(--card-2); }
  .item.checked {
    background: rgba(232, 160, 74, .08);
    border-color: rgba(232, 160, 74, .3);
  }
  .item input[type="checkbox"] {
    margin: 4px 0 0;
    accent-color: var(--amber);
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .item-body { flex: 1; min-width: 0; }
  .item-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: baseline;
  }
  .item-name {
    font-weight: 600;
    color: var(--text);
    font-size: 14.5px;
  }
  .item-price {
    color: var(--amber);
    font-family: 'DM Serif Display', serif;
    font-size: 15px;
    white-space: nowrap;
  }
  .item-desc {
    color: var(--text-dim);
    font-size: 12.5px;
    margin-top: 2px;
    line-height: 1.4;
  }

  /* ADD PERSON BTN */
  .add-person {
    width: 100%;
    background: transparent;
    border: 2px dashed var(--line);
    color: var(--amber);
    padding: 16px;
    border-radius: 14px;
    cursor: pointer;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: .25em;
    font-size: 15px;
    transition: all .15s;
    margin-bottom: 28px;
  }
  .add-person:hover {
    border-color: var(--amber);
    background: rgba(232, 160, 74, .06);
  }

  /* SUBMIT */
  .submit-bar {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .summary-line {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 14px;
  }
  .summary-line strong { color: var(--cream); }
  .submit-btn {
    background: var(--amber);
    color: #1a1310;
    border: none;
    padding: 15px 44px;
    border-radius: 100px;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: .3em;
    font-size: 17px;
    cursor: pointer;
    transition: all .18s;
    box-shadow: 0 4px 16px rgba(232, 160, 74, .3);
  }
  .submit-btn:hover:not(:disabled) {
    background: var(--amber-bright);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(232, 160, 74, .45);
  }
  .submit-btn:disabled {
    opacity: .5;
    cursor: not-allowed;
  }

  /* STATUS */
  .status {
    margin-top: 14px;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .status.show { display: block; }
  .status.success {
    background: rgba(106, 160, 80, .15);
    color: #b8d99c;
    border: 1px solid rgba(106, 160, 80, .35);
  }
  .status.error {
    background: rgba(193, 84, 42, .15);
    color: #f0a884;
    border: 1px solid rgba(193, 84, 42, .35);
  }

  /* SHEET LINK */
  .sheet-link-box {
    text-align: center;
    margin-top: 18px;
    padding: 14px;
    border: 1px dashed var(--line);
    border-radius: 10px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .sheet-link-box a {
    color: var(--amber);
    text-decoration: none;
    border-bottom: 1px dotted var(--amber);
  }

  .footer-note {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    margin-top: 36px;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
</style>
</head>

/* =============================================================
   APP STATE & RENDER
   ============================================================= */
const peopleEl = document.getElementById('people');
const totalPeopleEl = document.getElementById('totalPeople');
const totalItemsEl = document.getElementById('totalItems');

let personCounter = 0;

function makePersonCard() {
  personCounter++;
  const id = `p${personCounter}`;
  const card = document.createElement('div');
  card.className = 'person-card';
  card.dataset.personId = id;

  const isFirst = peopleEl.children.length === 0;

  card.innerHTML = `
    <div class="person-header">
      <div class="person-num">Person <span class="idx"></span></div>
      ${!isFirst ? `<button class="remove-btn" data-action="remove">Remove</button>` : ''}
    </div>
    <div class="person-fields two-col">
      <div>
        <label class="field">Name</label>
        <input type="text" class="p-name" placeholder="e.g. Sam (or 'Mom')" />
      </div>
      <div>
        <label class="field">Dietary notes (optional)</label>
        <input type="text" class="p-diet" placeholder="e.g. gluten-free, no nuts" />
      </div>
    </div>
    <div class="person-fields">
      <div>
        <label class="field">Special requests (optional)</label>
        <textarea class="p-notes" placeholder="e.g. sub fries for salad, no onions"></textarea>
      </div>
    </div>
    <div class="categories">
      ${MENU.map((cat, ci) => `
        <details class="category" data-cat-idx="${ci}">
          <summary>
            <span class="cat-title">${cat.cat}</span>
            <span class="cat-meta">
              <span class="selected-pill" data-pill>0 selected</span>
              <span class="chev">›</span>
            </span>
          </summary>
          <div class="items">
            ${cat.items.map((it, ii) => `
              <label class="item" data-item>
                <input type="checkbox" data-item-name="${it.n.replace(/"/g, '&quot;')}" data-item-price="${it.p}" />
                <div class="item-body">
                  <div class="item-row">
                    <span class="item-name">${it.n}</span>
                    <span class="item-price">${it.p === "—" ? "" : "$" + it.p}</span>
                  </div>
                  ${it.d ? `<div class="item-desc">${it.d}</div>` : ''}
                </div>
              </label>
            `).join('')}
          </div>
        </details>
      `).join('')}
    </div>
  `;

  // Remove handler
  const rm = card.querySelector('[data-action="remove"]');
  if (rm) rm.addEventListener('click', () => {
    card.remove();
    refreshIndexes();
    updateSummary();
  });

  // Checkbox handlers
  card.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => {
      cb.closest('.item').classList.toggle('checked', cb.checked);
      // update category pill
      const det = cb.closest('details.category');
      const count = det.querySelectorAll('input[type="checkbox"]:checked').length;
      const pill = det.querySelector('[data-pill]');
      pill.textContent = `${count} selected`;
      pill.classList.toggle('active', count > 0);
      updateSummary();
    });
  });

  peopleEl.appendChild(card);
  refreshIndexes();
  updateSummary();
}

function refreshIndexes() {
  [...peopleEl.children].forEach((c, i) => {
    c.querySelector('.idx').textContent = String(i + 1);
  });
}

function updateSummary() {
  const people = peopleEl.children.length;
  const items = peopleEl.querySelectorAll('input[type="checkbox"]:checked').length;
  totalPeopleEl.textContent = people;
  totalItemsEl.textContent = items;
}

document.getElementById('addPerson').addEventListener('click', makePersonCard);

// Init: one person card
makePersonCard();

// Setup shared sheet link if configured
if (SHARED_SHEET_VIEW_URL) {
  const box = document.getElementById('sheetLinkBox');
  const link = document.getElementById('sheetLink');
  link.href = SHARED_SHEET_VIEW_URL;
  box.style.display = 'block';
}

/* =============================================================
   SUBMIT
   ============================================================= */
const submitBtn = document.getElementById('submitBtn');
const statusEl = document.getElementById('status');

function setStatus(msg, kind) {
  statusEl.textContent = msg;
  statusEl.className = `status show ${kind}`;
}
function clearStatus() {
  statusEl.className = 'status';
  statusEl.textContent = '';
}

submitBtn.addEventListener('click', async () => {
  clearStatus();
  const submitter = document.getElementById('submitter').value.trim();
  if (!submitter) {
    setStatus("Please enter your name first.", "error");
    document.getElementById('submitter').focus();
    return;
  }

  const cards = [...peopleEl.children];
  const submissions = [];

  for (const card of cards) {
    const name = card.querySelector('.p-name').value.trim();
    const diet = card.querySelector('.p-diet').value.trim();
    const notes = card.querySelector('.p-notes').value.trim();
    const checks = [...card.querySelectorAll('input[type="checkbox"]:checked')];
    if (!name) {
      setStatus("Each person needs a name.", "error");
      card.querySelector('.p-name').focus();
      return;
    }
    if (checks.length === 0) {
      setStatus(`${name} hasn't selected any items yet.`, "error");
      return;
    }
    const items = checks.map(cb => ({
      name: cb.dataset.itemName,
      price: cb.dataset.itemPrice
    }));
    submissions.push({ name, diet, notes, items });
  }

  // Build payload — one row per person
  const timestamp = new Date().toISOString();
  const rows = submissions.map(p => ({
    timestamp,
    submitter,
    person_name: p.name,
    dietary_notes: p.diet,
    special_requests: p.notes,
    items: p.items.map(i => `${i.name} ($${i.price})`).join(' | '),
    item_count: p.items.length,
    estimated_total: p.items.reduce((sum, i) => sum + (parseFloat(i.price) || 0), 0).toFixed(2)
  }));

  submitBtn.disabled = true;
  submitBtn.textContent = "Submitting…";

  try {
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.startsWith("PASTE_")) {
      // No backend configured yet — show preview
      console.log("Submission payload:", rows);
      setStatus(
        "✓ Submission captured (preview mode — Apps Script URL not configured yet). Check browser console for the data that would be sent.",
        "success"
      );
      submitBtn.disabled = false;
      submitBtn.textContent = "Submit Orders";
      return;
    }

    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      // Apps Script web apps don't support custom headers via fetch CORS;
      // sending as text/plain bypasses preflight. Apps Script reads e.postData.contents.
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ rows })
    });

    if (!res.ok) throw new Error("Server responded " + res.status);
    setStatus(`✓ Submitted ${rows.length} order${rows.length > 1 ? 's' : ''}. Thanks, ${submitter}!`, "success");
    submitBtn.textContent = "Submitted ✓";
  } catch (err) {
    console.error(err);
    setStatus("Couldn't submit: " + err.message + ". Try again, or screenshot your selections.", "error");
    submitBtn.disabled = false;
    submitBtn.textContent = "Submit Orders";
  }
});
</script>
